<div class="body">
  <h2 class="title">Your Todos</h2>

  <input [value]="this.newTodo()" (input)="newTodo.set($event.target.value)" placeholder="Enter Your Todo">

  <button (click)="addTodo()" class="add">Add todo</button>

  <p class="line"></p>

  <ul>
    @for (todo of todos(); track $index) {
    <div class="todos">
      <li>

        <span>{{$index + 1}}</span>

        <span (click)="toggleTodo($index)"
          [style.text-decoration]="todo.done ? 'line-through' : 'none'">{{todo.text}}</span>

        <button (click)="deleteTodo($index)" type="submit
      " class="delBtn">Delete</button>

      </li>
    </div>
    }
  </ul>
</div>
